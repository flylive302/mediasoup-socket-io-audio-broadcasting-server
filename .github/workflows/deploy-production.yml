name: Deploy — Production (rolling, gated)

# Production deploy: build → push ghcr.io → roll the prod fleet one instance at a
# time. Requires ONE manual approval before the roll runs (AC3): the `deploy` job
# targets the `vultr-production` GitHub environment, which MUST be configured with
# a Required reviewer (Settings → Environments → vultr-production → Required
# reviewers). GitHub pauses the job for approval before any instance is touched.
#
# Auto-deploys the prod fleet on push to `master` (mirrors AWS' old master→deploy
# behaviour and the staging push→roll flow). Also runnable on demand via
# workflow_dispatch. The required-reviewer gate on the `vultr-production`
# environment still applies, so the roll pauses for approval before any instance
# is touched — set that environment to zero required reviewers if you want the
# push to roll straight through with no manual approval.

on:
  push:
    branches: [master]
  workflow_dispatch:
    inputs:
      roll_only:
        description: "Optional 'region:index[,region:index]' allowlist — roll only these instances (e.g. 'bom:1' to recreate one dead box without draining healthy siblings)."
        required: false
        type: string
        default: ""

jobs:
  build:
    uses: ./.github/workflows/ghcr-publish.yml
    permissions:
      contents: read
      packages: write
    # msab-sentry §10: ghcr-publish's `releases new/finalize` needs
    # SENTRY_AUTH_TOKEN (a repo secret). Secrets do NOT cross a `workflow_call`
    # boundary without this — without it the release step 401s ("No credentials
    # provided") and fails the whole deploy, even though a direct push-to-master
    # run of ghcr-publish (which has ambient repo secrets) succeeds.
    secrets: inherit

  deploy:
    needs: build
    uses: ./.github/workflows/deploy-rolling.yml
    with:
      environment: vultr-production # ← required-reviewer gate = the manual approval
      tf_workspace: msab-vultr-production
      tfvars_file: ci/production.tfvars
      image_tag: ${{ needs.build.outputs.image_tag }}
      roll_only: ${{ inputs.roll_only || '' }}
    secrets: inherit
