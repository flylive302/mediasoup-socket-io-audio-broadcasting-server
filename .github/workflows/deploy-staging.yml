name: Deploy — Staging (rolling)

# Push to `staging` auto-deploys the staging application layer (AC1): build the
# image, push to ghcr.io, then roll the staging fleet one instance at a time
# without a full outage. Also runnable on demand via workflow_dispatch.

on:
  push:
    branches: [staging]
  workflow_dispatch:

jobs:
  build:
    uses: ./.github/workflows/ghcr-publish.yml
    permissions:
      contents: read
      packages: write

  deploy:
    needs: build
    uses: ./.github/workflows/deploy-rolling.yml
    with:
      environment: vultr-staging
      tf_workspace: msab-vultr-staging
      tfvars_file: ci/staging.tfvars
      image_tag: ${{ needs.build.outputs.image_tag }}
    secrets: inherit
