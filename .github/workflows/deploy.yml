name: Deploy via ECR + ASG Instance Refresh

on:
  push:
    branches: [master]
  workflow_dispatch: # Manual trigger from GitHub UI

# Only one deploy workflow at a time (queues, doesn't cancel)
concurrency:
  group: aws-deploy
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    environment: aws-production
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Login to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image metadata
        id: meta
        run: |
          ECR_REGISTRY="${{ steps.ecr-login.outputs.registry }}"
          ECR_REPO="flylive-audio/msab"
          SHA_TAG="sha-${GITHUB_SHA::8}"
          FULL_IMAGE="${ECR_REGISTRY}/${ECR_REPO}"

          echo "registry=${ECR_REGISTRY}" >> "$GITHUB_OUTPUT"
          echo "repository=${ECR_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"
          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"

          echo "📦 Image: ${FULL_IMAGE}:${SHA_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}:latest
            ${{ steps.meta.outputs.full_image }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Verify image in ECR
        run: |
          aws ecr describe-images \
            --repository-name "${{ steps.meta.outputs.repository }}" \
            --image-ids imageTag="${{ steps.meta.outputs.image_tag }}" \
            --query 'imageDetails[0].{Size: imageSizeInBytes, Pushed: imagePushedAt, Tags: imageTags}' \
            --output table
          echo "✅ Image pushed and verified"

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    environment: aws-production
    strategy:
      fail-fast: false # Don't cancel other regions if one fails
      # AUDIT-005 FIX: Deploy sequentially — if Mumbai breaks, Frankfurt stays healthy
      max-parallel: 1
      matrix:
        region:
          - name: mumbai
            aws_region: ap-south-1
          - name: frankfurt
            aws_region: eu-central-1

    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ matrix.region.aws_region }}

      - name: Discover ASG name (${{ matrix.region.name }})
        id: asg
        run: |
          ASG_NAME=$(aws autoscaling describe-auto-scaling-groups \
            --query "AutoScalingGroups[?contains(Tags[?Key=='Project'].Value, 'flylive-audio')].AutoScalingGroupName | [0]" \
            --output text)

          if [ -z "$ASG_NAME" ] || [ "$ASG_NAME" = "None" ]; then
            echo "❌ No ASG found with Project=flylive-audio tag in ${{ matrix.region.aws_region }}"
            exit 1
          fi

          echo "✅ Found ASG: $ASG_NAME"
          echo "asg_name=$ASG_NAME" >> "$GITHUB_OUTPUT"

      - name: Cancel existing Instance Refresh (${{ matrix.region.name }})
        run: |
          ASG_NAME="${{ steps.asg.outputs.asg_name }}"

          # Check if there's an active refresh
          ACTIVE_STATUS=$(aws autoscaling describe-instance-refreshes \
            --auto-scaling-group-name "$ASG_NAME" \
            --max-records 1 \
            --query 'InstanceRefreshes[0].Status' \
            --output text 2>/dev/null || echo "None")

          if [ "$ACTIVE_STATUS" = "InProgress" ] || [ "$ACTIVE_STATUS" = "Pending" ]; then
            echo "⚠️  Active refresh found (status: $ACTIVE_STATUS). Cancelling..."
            aws autoscaling cancel-instance-refresh \
              --auto-scaling-group-name "$ASG_NAME" || true

            # Wait for cancellation to complete
            for i in $(seq 1 20); do
              sleep 15
              STATUS=$(aws autoscaling describe-instance-refreshes \
                --auto-scaling-group-name "$ASG_NAME" \
                --max-records 1 \
                --query 'InstanceRefreshes[0].Status' \
                --output text 2>/dev/null || echo "None")

              echo "  ⏳ Cancellation status: $STATUS (${i}/20)"

              if [ "$STATUS" != "Cancelling" ] && [ "$STATUS" != "InProgress" ] && [ "$STATUS" != "Pending" ]; then
                echo "✅ Previous refresh resolved (status: $STATUS)"
                break
              fi
            done
          else
            echo "✅ No active refresh to cancel (status: $ACTIVE_STATUS)"
          fi

          # Also complete any stuck lifecycle hooks
          PENDING_INSTANCES=$(aws autoscaling describe-auto-scaling-groups \
            --auto-scaling-group-name "$ASG_NAME" \
            --query "AutoScalingGroups[0].Instances[?LifecycleState=='Pending:Wait'].InstanceId" \
            --output text 2>/dev/null || echo "")

          if [ -n "$PENDING_INSTANCES" ] && [ "$PENDING_INSTANCES" != "None" ]; then
            LAUNCH_HOOK=$(aws autoscaling describe-lifecycle-hooks \
              --auto-scaling-group-name "$ASG_NAME" \
              --query "LifecycleHooks[?LifecycleTransition=='autoscaling:EC2_INSTANCE_LAUNCHING'].LifecycleHookName | [0]" \
              --output text 2>/dev/null || echo "")

            if [ -n "$LAUNCH_HOOK" ] && [ "$LAUNCH_HOOK" != "None" ]; then
              for INSTANCE_ID in $PENDING_INSTANCES; do
                echo "  🔧 Completing launch lifecycle hook for $INSTANCE_ID"
                aws autoscaling complete-lifecycle-action \
                  --lifecycle-action-result CONTINUE \
                  --instance-id "$INSTANCE_ID" \
                  --auto-scaling-group-name "$ASG_NAME" \
                  --lifecycle-hook-name "$LAUNCH_HOOK" || true
              done
            fi
          fi

      - name: Start Instance Refresh (${{ matrix.region.name }})
        id: refresh
        run: |
          ASG_NAME="${{ steps.asg.outputs.asg_name }}"
          echo "🚀 Starting instance refresh for $ASG_NAME in ${{ matrix.region.aws_region }}..."
          echo "📦 New instances will pull image tag: ${{ needs.build-and-push.outputs.image_tag }}"

          REFRESH_ID=$(aws autoscaling start-instance-refresh \
            --auto-scaling-group-name "$ASG_NAME" \
            --preferences '{"MinHealthyPercentage": 50, "InstanceWarmup": 300}' \
            --query 'InstanceRefreshId' \
            --output text)

          echo "🔄 Instance refresh started: $REFRESH_ID"
          echo "refresh_id=$REFRESH_ID" >> "$GITHUB_OUTPUT"

      - name: Wait for Instance Refresh (${{ matrix.region.name }})
        run: |
          ASG_NAME="${{ steps.asg.outputs.asg_name }}"
          REFRESH_ID="${{ steps.refresh.outputs.refresh_id }}"
          MAX_WAIT=1800  # 30 minutes
          ELAPSED=0
          INTERVAL=30

          while [ $ELAPSED -lt $MAX_WAIT ]; do
            STATUS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].Status' \
              --output text)

            PROGRESS=$(aws autoscaling describe-instance-refreshes \
              --auto-scaling-group-name "$ASG_NAME" \
              --instance-refresh-ids "$REFRESH_ID" \
              --query 'InstanceRefreshes[0].PercentageComplete' \
              --output text 2>/dev/null || echo "0")

            echo "  ⏳ Status: $STATUS | Progress: ${PROGRESS}% (${ELAPSED}s elapsed)"

            case "$STATUS" in
              Successful)
                echo "✅ Instance refresh completed successfully!"
                exit 0
                ;;
              Failed|Cancelled|RollbackSuccessful|RollbackFailed)
                echo "❌ Instance refresh $STATUS"
                aws autoscaling describe-instance-refreshes \
                  --auto-scaling-group-name "$ASG_NAME" \
                  --instance-refresh-ids "$REFRESH_ID" \
                  --query 'InstanceRefreshes[0].StatusReason' \
                  --output text
                exit 1
                ;;
              *)
                # If stuck at 0% for 10+ minutes, try completing lifecycle hooks
                if [ "$PROGRESS" = "0" ] && [ $ELAPSED -ge 600 ]; then
                  echo "  ⚠️  Stuck at 0% — checking for lifecycle hooks..."
                  PENDING=$(aws autoscaling describe-auto-scaling-groups \
                    --auto-scaling-group-name "$ASG_NAME" \
                    --query "AutoScalingGroups[0].Instances[?LifecycleState=='Pending:Wait'].InstanceId" \
                    --output text 2>/dev/null || echo "")

                  if [ -n "$PENDING" ] && [ "$PENDING" != "None" ]; then
                    LAUNCH_HOOK=$(aws autoscaling describe-lifecycle-hooks \
                      --auto-scaling-group-name "$ASG_NAME" \
                      --query "LifecycleHooks[?LifecycleTransition=='autoscaling:EC2_INSTANCE_LAUNCHING'].LifecycleHookName | [0]" \
                      --output text 2>/dev/null || echo "")

                    if [ -n "$LAUNCH_HOOK" ] && [ "$LAUNCH_HOOK" != "None" ]; then
                      for IID in $PENDING; do
                        echo "  🔧 Auto-completing launch hook for $IID"
                        aws autoscaling complete-lifecycle-action \
                          --lifecycle-action-result CONTINUE \
                          --instance-id "$IID" \
                          --auto-scaling-group-name "$ASG_NAME" \
                          --lifecycle-hook-name "$LAUNCH_HOOK" || true
                      done
                    fi
                  fi
                fi

                sleep $INTERVAL
                ELAPSED=$((ELAPSED + INTERVAL))
                ;;
            esac
          done

          echo "❌ Timed out after ${MAX_WAIT}s waiting for instance refresh"
          exit 1

      - name: Health Soak — Verify stability (${{ matrix.region.name }})
        run: |
          echo "🕐 Starting 3-minute health soak for ${{ matrix.region.name }}..."
          echo "   New instances must stay healthy for 180s before proceeding to next region."

          ASG_NAME="${{ steps.asg.outputs.asg_name }}"
          SOAK_DURATION=180
          INTERVAL=30
          ELAPSED=0

          while [ $ELAPSED -lt $SOAK_DURATION ]; do
            sleep $INTERVAL
            ELAPSED=$((ELAPSED + INTERVAL))

            # Check healthy instance count
            HEALTHY=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-name "$ASG_NAME" \
              --query "AutoScalingGroups[0].Instances[?HealthStatus=='Healthy'] | length(@)" \
              --output text 2>/dev/null || echo "0")

            TOTAL=$(aws autoscaling describe-auto-scaling-groups \
              --auto-scaling-group-name "$ASG_NAME" \
              --query "AutoScalingGroups[0].Instances | length(@)" \
              --output text 2>/dev/null || echo "0")

            echo "  ⏳ Health soak: ${ELAPSED}s/${SOAK_DURATION}s — ${HEALTHY}/${TOTAL} instances healthy"

            if [ "$HEALTHY" -lt 1 ]; then
              echo "❌ SOAK FAILED: Zero healthy instances at ${ELAPSED}s — aborting deploy!"
              echo "   ⛔ Next region will NOT be deployed."
              exit 1
            fi
          done

          echo "✅ Health soak passed — all instances stable for ${SOAK_DURATION}s"

      - name: Post Configure AWS Credentials
        if: always()
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ matrix.region.aws_region }}

      - name: Complete job
        if: always()
        run: echo "Deploy job for ${{ matrix.region.name }} finished with status ${{ job.status }}"
