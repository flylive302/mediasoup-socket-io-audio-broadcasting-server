name: Deploy to AWS EC2

on:
  push:
    branches: [master]
  workflow_dispatch: # Manual trigger from GitHub UI

# Only one deploy at a time
concurrency:
  group: aws-deploy
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

      - name: Test
        run: npm test

  deploy:
    needs: ci
    runs-on: ubuntu-latest
    environment: aws-production

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script_stop: true
          command_timeout: 10m
          script: |
            set -e
            APP_DIR="/opt/msab"
            echo "📦 Pulling latest code..."
            cd "$APP_DIR"
            sudo git fetch origin
            sudo git checkout master
            sudo git pull origin master

            echo "🔨 Building Docker image..."
            sudo docker build --network=host -t msab:latest -f docker/Dockerfile .

            echo "🔄 Restarting container..."
            sudo docker stop msab 2>/dev/null || true
            sudo docker rm msab 2>/dev/null || true
            sudo docker run -d \
              --name msab \
              --restart unless-stopped \
              --network host \
              --env-file .env \
              msab:latest

            echo "⏳ Waiting for health check..."
            for i in $(seq 1 12); do
              HTTP_CODE=$(curl -s -o /dev/null -w '%{http_code}' http://localhost:3030/health)
              if [ "$HTTP_CODE" = "200" ]; then
                echo "✅ Health check passed on attempt $i"
                break
              fi
              echo "  Attempt $i/12 — got $HTTP_CODE, retrying..."
              sleep 5
            done

            if [ "$HTTP_CODE" != "200" ]; then
              echo "❌ Health check failed after 12 attempts"
              sudo docker logs msab --tail 40
              exit 1
            fi

            echo "🧹 Cleaning up old images..."
            sudo docker image prune -f

            echo "✅ Deploy complete!"
