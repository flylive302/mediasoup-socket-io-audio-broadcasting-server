name: Publish image to ghcr.io

on:
  push:
    branches: [master]
  workflow_dispatch: # Manual trigger from GitHub UI
  workflow_call: # Reused by the deploy workflows (build the caller's ref, return the tag)
    outputs:
      image_tag:
        description: "The sha-<commit8> tag that was pushed."
        value: ${{ jobs.build-and-push.outputs.image_tag }}
      full_image:
        description: "The full ghcr.io image path (no tag)."
        value: ${{ jobs.build-and-push.outputs.full_image }}

# Only one publish at a time (queues, doesn't cancel)
concurrency:
  group: ghcr-publish
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

      - name: Architecture Guardrails
        run: npm run architecture:check

      - name: Test
        run: npm test

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      full_image: ${{ steps.meta.outputs.full_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          # ghcr.io repository paths must be lowercase.
          FULL_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          SHA_TAG="sha-${GITHUB_SHA::8}"

          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

          echo "📦 Image: ${FULL_IMAGE}:${SHA_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}:latest
            ${{ steps.meta.outputs.full_image }}:${{ steps.meta.outputs.image_tag }}
          # msab-sentry §10: SENTRY_RELEASE (build time) MUST be byte-identical to
          # the runtime SENTRY_RELEASE cloud-init writes — both are this one
          # `image_tag` (= sha-<commit8>) threaded through, so maps never drift.
          # The auth token is a BuildKit secret: mounted into one RUN, never a layer.
          build-args: |
            SENTRY_RELEASE=${{ steps.meta.outputs.image_tag }}
          secrets: |
            sentry_token=${{ secrets.SENTRY_AUTH_TOKEN }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # amd64 only: Vultr's High Frequency plans (the Phase 1 fleet target)
          # are x86, unlike AWS Graviton/arm64. Same runtime as the ECR image
          # for that arch — no config change; dropping the arm64 leg (which
          # needed slow QEMU emulation) since nothing on Vultr pulls it.
          platforms: linux/amd64

      # msab-sentry §10: formalise the release the build's sourcemaps were
      # uploaded under. HARD FAIL — without a finalised release the maps are
      # unreadable, and nothing is serving traffic at build time so being loud
      # is free. This is also the compensating gate for a missing auth token:
      # the Dockerfile skips upload when the token is absent, but `releases new`
      # here errors on an empty token, so a genuinely-misconfigured pipeline
      # fails visibly rather than silently shipping unreadable maps.
      # SENTRY_ORG/SENTRY_PROJECT are required by the lifecycle subcommands
      # (unlike `sourcemaps upload`, they take no --org/--project flag here).
      - name: Sentry release lifecycle
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: flylive
          SENTRY_PROJECT: node-msab
          SHA_TAG: ${{ steps.meta.outputs.image_tag }}
        run: |
          npm install -g @sentry/cli@3.6.1
          sentry-cli releases new "$SHA_TAG"
          sentry-cli releases finalize "$SHA_TAG"
          # WARN ONLY — suspect-commit attribution needs this repo linked in the
          # flylive org's GitHub integration (a console setting outside this
          # repo). An unlinked repo must not break image publishing.
          sentry-cli releases set-commits "$SHA_TAG" --auto \
            || echo "::warning::set-commits failed — is mediasoup-socket-io-audio-broadcasting-server linked in the flylive GitHub integration?"

      - name: Summary
        run: |
          echo "✅ Pushed ${{ steps.meta.outputs.full_image }}:${{ steps.meta.outputs.image_tag }} (+ :latest)"
