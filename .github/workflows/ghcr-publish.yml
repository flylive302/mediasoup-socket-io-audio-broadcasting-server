name: Publish image to ghcr.io

on:
  push:
    branches: [master]
  workflow_dispatch: # Manual trigger from GitHub UI

# Only one publish at a time (queues, doesn't cancel)
concurrency:
  group: ghcr-publish
  cancel-in-progress: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Type Check
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint --if-present

      - name: Architecture Guardrails
        run: npm run architecture:check

      - name: Test
        run: npm test

  build-and-push:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
      full_image: ${{ steps.meta.outputs.full_image }}
    steps:
      - uses: actions/checkout@v4

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata
        id: meta
        run: |
          # ghcr.io repository paths must be lowercase.
          FULL_IMAGE="ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')"
          SHA_TAG="sha-${GITHUB_SHA::8}"

          echo "full_image=${FULL_IMAGE}" >> "$GITHUB_OUTPUT"
          echo "image_tag=${SHA_TAG}" >> "$GITHUB_OUTPUT"

          echo "📦 Image: ${FULL_IMAGE}:${SHA_TAG}"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile
          push: true
          tags: |
            ${{ steps.meta.outputs.full_image }}:latest
            ${{ steps.meta.outputs.full_image }}:${{ steps.meta.outputs.image_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          # amd64 only: Vultr's High Frequency plans (the Phase 1 fleet target)
          # are x86, unlike AWS Graviton/arm64. Same runtime as the ECR image
          # for that arch — no config change; dropping the arm64 leg (which
          # needed slow QEMU emulation) since nothing on Vultr pulls it.
          platforms: linux/amd64

      - name: Summary
        run: |
          echo "✅ Pushed ${{ steps.meta.outputs.full_image }}:${{ steps.meta.outputs.image_tag }} (+ :latest)"
